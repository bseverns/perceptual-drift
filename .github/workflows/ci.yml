name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install deps
      run: |
        python -m pip install --upgrade pip setuptools wheel
        python -m pip install -r requirements-dev.txt -c constraints/py310-linux.txt
        python -m pip install -e . --no-build-isolation

    - name: Lint
      run: |
        flake8 --max-line-length 110 --extend-ignore E203 \
          software/control-bridge \
          software/operator_ui \
          scripts/check_stack.py \
          scripts/validate_config.py \
          tests
        black --check \
          software/control-bridge \
          software/operator_ui \
          scripts/check_stack.py \
          scripts/validate_config.py \
          tests

    - name: Run unit tests
      run: |
        python -m pytest tests -q

    - name: Smoke the control stack (CI-short)
      run: |
        pd-check-stack --max-frames 24 --send-interval 0.01 --cooldown 0.05

    - name: Package zip
      run: |
        git archive --format=zip --output perceptual-drift-artifacts.zip HEAD
    - uses: actions/upload-artifact@v4
      with:
        name: perceptual-drift
        path: perceptual-drift-artifacts.zip
